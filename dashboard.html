<title>Dashboard Guru BK - Angket Tugas Perkembangan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg: #FAF6EF;
  --surface: #FFFFFF;
  --ink: #2E3A59;
  --ink-soft: #5B6478;
  --border: #E3DCCB;
  --accent: #F2994A;
  --accent-dark: #D9782E;
  --teal: #2F9E8F;
  --teal-soft: rgba(47,158,143,0.12);
  --shadow: 0 4px 18px rgba(46,58,89,0.08);
  --radius: 18px;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 8% 12%, rgba(242,153,74,0.06), transparent 40%),
    radial-gradient(circle at 92% 85%, rgba(47,158,143,0.07), transparent 40%);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3 {
  font-family: 'Fraunces', serif;
  color: var(--ink);
  margin: 0 0 8px 0;
  line-height: 1.15;
}

h1 { font-size: 2.4rem; font-weight: 600; }
h2 { font-size: 1.7rem; font-weight: 600; }
h3 { font-size: 1.05rem; font-weight: 600; }

p { line-height: 1.55; }
.muted { color: var(--ink-soft); }

button { font-family: inherit; cursor: pointer; }
a { color: var(--teal); }

#app {
  max-width: 880px;
  margin: 0 auto;
  padding: 32px 20px 64px;
  min-height: 100vh;
}

/* ---------- Landing ---------- */
.hero { text-align: center; padding: 40px 0 10px; }
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-dark);
  margin-bottom: 10px;
}
.lead {
  max-width: 560px;
  margin: 16px auto 36px;
  color: var(--ink-soft);
  font-size: 1.05rem;
}

.role-cards {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.role-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 32px;
  width: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.role-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(46,58,89,0.13); }
.role-card:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }
.role-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}
.role-card-alt .role-icon { background: var(--teal); }
.role-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.15rem; }
.role-sub { color: var(--ink-soft); font-size: 0.88rem; text-align: center; }
.footnote { font-size: 0.82rem; color: var(--ink-soft); margin-top: 18px; }

/* ---------- Card pages ---------- */
.card-page {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
  margin-top: 10px;
}
.card-page.narrow { max-width: 480px; margin: 10px auto 0; }
.card-page.wide { max-width: 880px; }

.back-link {
  background: none; border: none; color: var(--teal);
  font-size: 0.92rem; padding: 0; margin-bottom: 18px; font-weight: 600;
}
.back-link:hover { text-decoration: underline; }

.alert-error {
  background: #FBE6E0; color: #9C3B25; border: 1px solid #EFB8A6;
  border-radius: 10px; padding: 10px 14px; font-size: 0.9rem; margin-bottom: 16px;
}

/* ---------- Form ---------- */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 18px 0 24px;
}
.form-grid label {
  display: flex; flex-direction: column; gap: 6px;
  font-size: 0.85rem; font-weight: 600; color: var(--ink-soft);
}
.form-grid input, .form-grid select {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem;
  padding: 11px 13px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: #FFFDFA;
  color: var(--ink);
}
.form-grid input:focus, .form-grid select:focus {
  outline: none; border-color: var(--teal);
}

.btn-primary {
  background: var(--accent);
  color: white;
  border: none;
  padding: 13px 24px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 1rem;
  box-shadow: 0 3px 10px rgba(242,153,74,0.35);
}
.btn-primary:hover { background: var(--accent-dark); }
.btn-primary:disabled { opacity: 0.6; cursor: default; }
.btn-primary:focus-visible { outline: 3px solid var(--ink); outline-offset: 2px; }

.btn-secondary {
  background: var(--teal-soft);
  color: var(--teal);
  border: 1.5px solid var(--teal);
  padding: 12px 22px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 0.96rem;
}
.btn-secondary:hover { background: rgba(47,158,143,0.2); }

.btn-link {
  background: none; border: none; color: var(--teal);
  font-weight: 600; font-size: 0.9rem; padding: 6px 10px;
}
.btn-link:hover { text-decoration: underline; }

.duplicate-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

/* ---------- Quiz ---------- */
.quiz-page { padding-bottom: 28px; }
.progress-wrap { margin-bottom: 22px; }
.progress-bar {
  height: 8px; background: var(--border); border-radius: 6px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--teal), var(--accent));
  transition: width 0.25s ease;
}
.progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; color: var(--ink-soft); margin: 8px 0 0;
}
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--accent-dark); margin-bottom: 4px;
}
.likert-key {
  font-size: 0.82rem; color: var(--ink-soft);
  background: var(--teal-soft); border-radius: 10px; padding: 10px 14px;
  margin: 14px 0 6px;
}

.quiz-list { margin-top: 18px; display: flex; flex-direction: column; gap: 18px; }
.quiz-item {
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
}
.quiz-item:last-child { border-bottom: none; }
.item-text { font-size: 1rem; margin: 0 0 12px; }
.item-no { font-family: 'JetBrains Mono', monospace; color: var(--accent-dark); font-weight: 600; }

.choices { display: flex; gap: 8px; flex-wrap: wrap; }
.choice-btn {
  border: 1.5px solid var(--border);
  background: #FFFDFA;
  color: var(--ink-soft);
  padding: 9px 16px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 0.88rem;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.12s ease;
}
.choice-btn:hover { border-color: var(--teal); color: var(--teal); }
.choice-btn.selected {
  background: var(--teal);
  border-color: var(--teal);
  color: white;
}

.quiz-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 26px;
}

/* ---------- Result ---------- */
.result-header { text-align: center; margin-bottom: 20px; }
.total-block {
  display: flex; align-items: center; gap: 22px;
  background: var(--teal-soft);
  border-radius: var(--radius);
  padding: 22px 26px;
  margin-bottom: 26px;
  flex-wrap: wrap;
}
.seal {
  flex-shrink: 0;
  width: 88px; height: 88px;
  border-radius: 50%;
  border: 4px double rgba(255,255,255,0.7);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif;
  font-size: 1.7rem; font-weight: 700;
  color: white;
  transform: rotate(-6deg);
  box-shadow: 0 6px 16px rgba(0,0,0,0.18);
}
.seal-SB { background: #2F9E8F; }
.seal-B { background: #5FA86B; }
.seal-C { background: #E8B33D; color: #3A2A06; border-color: rgba(58,42,6,0.25); }
.seal-K { background: #E8823C; }
.seal-SK { background: #D64545; }
.total-text { flex: 1; min-width: 200px; }
.total-label { font-weight: 600; margin: 0 0 6px; }

.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 28px;
}
.chart-box {
  background: #FFFDFA;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}
.wide-chart { grid-column: 1 / -1; }

.ind-cards { display: flex; flex-direction: column; gap: 14px; }
.ind-card {
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  background: #FFFDFA;
}
.ind-card-head {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  margin-bottom: 8px; flex-wrap: wrap;
}
.ind-narrative { margin: 0; color: var(--ink-soft); font-size: 0.95rem; }

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 600;
  padding: 5px 11px; border-radius: 20px;
  white-space: nowrap;
}

.raw-answers { margin-top: 26px; }
.raw-answers summary {
  cursor: pointer; font-weight: 600; color: var(--teal); padding: 8px 0;
}
.raw-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.86rem; }
.raw-table th, .raw-table td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
.raw-table th { background: var(--teal-soft); font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; }

.result-actions { display: flex; gap: 12px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }

/* ---------- Teacher dashboard ---------- */
.dash-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dash-filter { margin: 14px 0 20px; }
.dash-filter select {
  font-family: 'Plus Jakarta Sans', sans-serif;
  padding: 9px 12px; border-radius: 10px; border: 1.5px solid var(--border);
  font-size: 0.92rem;
}
.summary-cards { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.summary-card {
  flex: 1; min-width: 160px;
  background: var(--teal-soft);
  border-radius: 14px; padding: 18px 20px;
  display: flex; flex-direction: column; gap: 4px;
}
.summary-num { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 600; color: var(--teal); }
.summary-label { font-size: 0.85rem; color: var(--ink-soft); }

.table-wrap { overflow-x: auto; margin-top: 10px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
.data-table th, .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
.data-table th { font-family: 'JetBrains Mono', monospace; font-size: 0.74rem; text-transform: uppercase; color: var(--ink-soft); letter-spacing: 0.04em; }
.data-table tr:hover { background: #FBF8F1; }

/* ---------- Toast ---------- */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: white; padding: 12px 22px; border-radius: 12px;
  font-size: 0.9rem; opacity: 0; transition: all 0.25s ease; pointer-events: none;
  max-width: 90vw; text-align: center; z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ---------- Responsive ---------- */
@media (max-width: 680px) {
  h1 { font-size: 1.9rem; }
  .card-page { padding: 22px 18px; }
  .form-grid { grid-template-columns: 1fr; }
  .role-cards { flex-direction: column; align-items: center; }
  .role-card { width: 100%; max-width: 280px; }
  .charts-grid { grid-template-columns: 1fr; }
  .total-block { flex-direction: column; text-align: center; }
  .quiz-nav { flex-direction: column-reverse; gap: 12px; }
  .quiz-nav button { width: 100%; }
  .dash-top { flex-direction: column; gap: 12px; align-items: stretch; }
}

/* ---------- Print ---------- */
@media print {
  .back-link, .result-actions, #toast { display: none !important; }
  body { background: white; }
  .card-page { box-shadow: none; border: none; }
}

/* ---------- additions for split student/teacher files ---------- */
.hero-small { text-align: center; margin-bottom: 26px; }
.hero-small h1 { font-size: 1.9rem; }
.hero-small .lead { margin: 12px auto 0; font-size: 0.98rem; }

.dash-actions { display: flex; gap: 10px; flex-wrap: wrap; }
@media (max-width: 680px) {
  .dash-top { flex-direction: column; }
  .dash-actions { width: 100%; }
  .dash-actions button { flex: 1; }
}
</style>

/* ===================== SCORING ===================== */
const LIKERT_RAW = { SS: 4, S: 3, TS: 2, STS: 1 };

function scoreItem(answer, type) {
  const raw = LIKERT_RAW[answer];
  if (raw === undefined) throw new Error("Jawaban tidak valid untuk item");
  return type === "F" ? raw : (5 - raw);
}

function categorize(pct) {
  if (pct > 80) return "SB";
  if (pct > 60) return "B";
  if (pct > 40) return "C";
  if (pct > 20) return "K";
  return "SK";
}

function computeResults(answers) {
  const perIndicator = {};
  INDICATORS.forEach(function (ind) {
    const items = ITEMS.filter(function (it) { return it.indicator === ind.id; });
    let raw = 0;
    items.forEach(function (it) {
      raw += scoreItem(answers[it.id], it.type);
    });
    const pct = ((raw - 10) / 30) * 100;
    perIndicator[ind.id] = { raw: raw, pct: pct, cat: categorize(pct) };
  });
  const totalRaw = Object.keys(perIndicator).reduce(function (sum, k) {
    return sum + perIndicator[k].raw;
  }, 0);
  const totalPct = ((totalRaw - 50) / 150) * 100;
  return { perIndicator: perIndicator, total: { raw: totalRaw, pct: totalPct, cat: categorize(totalPct) } };
}

function allAnswered(answers) {
  return ITEMS.every(function (it) { return answers[it.id] !== undefined; });
}

/* ===================== NETWORK (jembatan ke Google Sheets) ===================== */
async function checkExisting(kelas, noAbsen) {
  if (!IS_CONFIGURED) return null;
  try {
    const url = SHEET_API_URL + "?secret=" + encodeURIComponent(API_SECRET) +
      "&action=check&kelas=" + encodeURIComponent(kelas) + "&noAbsen=" + encodeURIComponent(noAbsen);
    const res = await fetch(url);
    const json = await res.json();
    if (json && json.ok) return json.found;
    return null;
  } catch (e) {
    return null;
  }
}

async function submitToSheet(payload) {
  if (!IS_CONFIGURED) return false;
  try {
    const res = await fetch(SHEET_API_URL, {
      method: "POST",
      body: JSON.stringify({ secret: API_SECRET, data: payload })
    });
    const json = await res.json();
    return !!(json && json.ok);
  } catch (e) {
    return false;
  }
}

async function fetchAllSubmissions() {
  if (!IS_CONFIGURED) return { ok: false, data: [], error: "Belum dikonfigurasi" };
  try {
    const url = SHEET_API_URL + "?secret=" + encodeURIComponent(API_SECRET);
    const res = await fetch(url);
    const json = await res.json();
    if (json && json.ok) return { ok: true, data: json.data || [] };
    return { ok: false, data: [], error: (json && json.error) || "Gagal mengambil data" };
  } catch (e) {
    return { ok: false, data: [], error: String(e) };
  }
}
/* ===================== STATE ===================== */
const state = {
  view: IS_CONFIGURED ? "loading" : "notConfigured",
  submissions: [],
  filterKelas: "ALL",
  detail: null,
  loadError: ""
};

const chartInstances = {};
function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function fmtDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" }) +
      " " + d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
  } catch (e) { return iso || "-"; }
}

function badgeHtml(cat) {
  const info = CATEGORY_INFO[cat] || { label: cat, bg: "#999", text: "#fff" };
  return '<span class="badge" style="background:' + info.bg + ";color:" + info.text + '">' +
    cat + " &middot; " + info.label + "</span>";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  if (!t) return;
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function () { t.classList.remove("show"); }, 4500);
}

/* ===================== RENDER DISPATCH ===================== */
function render() {
  const app = document.getElementById("app");
  let html = "";
  switch (state.view) {
    case "notConfigured": html = renderNotConfigured(); break;
    case "loading": html = renderLoading(); break;
    case "loadError": html = renderLoadError(); break;
    case "dashboard": html = renderDashboard(); break;
    case "detail": html = renderResultView(state.detail.results, state.detail); break;
    default: html = renderLoading();
  }
  app.innerHTML = html;
  window.scrollTo(0, 0);
  if (state.view === "dashboard") renderAggregateChart();
  if (state.view === "detail") renderResultCharts(state.detail.results);
}

function renderNotConfigured() {
  return (
    '<div class="card-page narrow">' +
      "<h2>Pengaturan Belum Lengkap</h2>" +
      '<p class="muted">Dashboard ini belum terhubung ke sumber data. Mohon tempel URL Web App Google Apps Script Anda pada bagian SHEET_API_URL di awal file ini, lalu muat ulang halaman.</p>' +
    "</div>"
  );
}

function renderLoading() {
  return '<div class="card-page narrow"><p class="muted">Memuat data dari Google Sheets...</p></div>';
}

function renderLoadError() {
  return (
    '<div class="card-page narrow">' +
      "<h2>Gagal Memuat Data</h2>" +
      '<p class="muted">' + escapeHtml(state.loadError) + "</p>" +
      '<p class="muted">Periksa kembali URL dan kode rahasia yang ditempel di awal file ini, lalu coba muat ulang.</p>' +
      '<button class="btn-primary" onclick="loadData()">Coba Lagi</button>' +
    "</div>"
  );
}

async function loadData() {
  state.view = "loading";
  render();
  const res = await fetchAllSubmissions();
  if (!res.ok) {
    state.loadError = res.error || "Terjadi kesalahan saat mengambil data.";
    state.view = "loadError";
    render();
    return;
  }
  state.submissions = res.data;
  state.view = "dashboard";
  render();
}

  return state.submissions.filter(function (s) { return s.kelas === state.filterKelas; });
}

    avgCatLabel = CATEGORY_INFO[categorize(avgPct)].label;
  }

  const rows = subs.slice()
    .sort(function (a, b) {
      if (a.kelas !== b.kelas) return a.kelas.localeCompare(b.kelas);
      return Number(a.noAbsen) - Number(b.noAbsen);

        "<h2>Dashboard Guru BK</h2>" +

      "</div>" +
      '<div class="summary-cards">' +
        '<div class="summary-card"><span class="summary-num">' + subs.length + '</span><span class="summary-label">Siswa sudah mengisi</span></div>' +
        '<div class="summary-card"><span class="summary-num">' + avgCatLabel + '</span><span class="summary-label">Rata-rata kategori keseluruhan</span></div>' +
      "</div>" +
      '<div class="chart-box wide-chart"><canvas id="teacherAggChart"></canvas></div>' +

    "</div>"
  );
}

function renderAggregateChart() {
  const subs = filteredSubmissions();
  const id = "teacherAggChart";
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const avgPerIndicator = INDICATORS.map(function (ind) {
    if (subs.length === 0) return 0;
    const sum = subs.reduce(function (acc, s) { return acc + s.results.perIndicator[ind.id].pct; }, 0);
    return Math.round(sum / subs.length);

  chartInstances[id] = new Chart(ctx, {
    type: "bar",
    data: { labels: INDICATORS.map(function (ind) { return ind.name; }), datasets: [{ label: "Rata-rata capaian (%)", data: avgPerIndicator, backgroundColor: "#2F9E8F" }] },
    options: { indexAxis: "y", responsive: true, scales: { x: { min: 0, max: 100 } }, plugins: { legend: { display: false } } }

function openDetail(kelas, noAbsen) {

/* ===================== CSV EXPORT ===================== */
function csvEscape(v) {
  const s = String(v == null ? "" : v);
  if (s.indexOf(",") !== -1 || s.indexOf('"') !== -1 || s.indexOf("\n") !== -1) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function downloadCSV() {
  const subs = filteredSubmissions();
  if (subs.length === 0) { showToast("Tidak ada data untuk diunduh."); return; }
  const itemCols = ITEMS.map(function (it) { return "item_" + it.id; });
  const header = ["nama_lengkap", "nama_panggilan", "kelas", "no_absen", "tanggal_isi"]
    .concat(INDICATORS.map(function (ind) { return "ind" + ind.id + "_raw"; }))
    .concat(INDICATORS.map(function (ind) { return "ind" + ind.id + "_pct"; }))
    .concat(INDICATORS.map(function (ind) { return "ind" + ind.id + "_kategori"; }))
    .concat(["total_raw", "total_pct", "total_kategori"])
    .concat(itemCols);

  const lines = [header.join(",")];
  subs.forEach(function (s) {
    const row = [csvEscape(s.namaLengkap), csvEscape(s.namaPanggilan), csvEscape(s.kelas), csvEscape(s.noAbsen), csvEscape(fmtDate(s.savedAt))];
    INDICATORS.forEach(function (ind) { row.push(s.results.perIndicator[ind.id].raw); });
    INDICATORS.forEach(function (ind) { row.push(Math.round(s.results.perIndicator[ind.id].pct)); });
    INDICATORS.forEach(function (ind) { row.push(s.results.perIndicator[ind.id].cat); });
    row.push(s.results.total.raw, Math.round(s.results.total.pct), s.results.total.cat);
    ITEMS.forEach(function (it) { row.push(s.answers[it.id] || ""); });
    lines.push(row.join(","));
  });

  const csvContent = lines.join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "hasil_angket_tugas_perkembangan.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function boot() {
  if (IS_CONFIGURED) { loadData(); } else { render(); }
}

document.addEventListener("DOMContentLoaded", boot);
</script>
